<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Heebo',sans-serif;direction:rtl;background:#0A0A14;color:#E8E8F0;height:100vh;overflow-y:auto;overflow-x:hidden;}
  .topbar{background:linear-gradient(160deg,#0D0D1F,#111230,#0E1E3A);border-bottom:1px solid #ffffff0c;padding:16px 20px 12px;}
  .topbar-inner{max-width:960px;margin:0 auto;}
  .topbar-title{font-size:12px;letter-spacing:4px;color:#FFD700;font-weight:700;margin-bottom:3px;}
  .topbar-h1{font-size:22px;font-weight:900;color:#fff;margin:0;}
  .topbar-row2{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;}
  .nav-btn{padding:5px 12px;border-radius:14px;border:1px solid #ffffff18;background:transparent;color:#555;cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;transition:.15s;}
  .nav-btn.active{border-color:#FFD700;background:#FFD70015;color:#FFD700;}
  .month-btn{padding:4px 8px 4px 4px;border-radius:12px;border:1px solid #ffffff12;background:transparent;color:#555;cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;transition:.15s;display:inline-flex;align-items:center;gap:4px;}
  .month-btn.active{border-color:#4ECDC4;background:#4ECDC412;color:#4ECDC4;}
  .month-del{width:14px;height:14px;border-radius:50%;background:#FF6B6B22;border:none;color:#FF6B6B66;cursor:pointer;font-size:9px;display:inline-flex;align-items:center;justify-content:center;font-family:'Heebo',sans-serif;transition:.15s;}
  .month-del:hover{background:#FF6B6B44;color:#FF6B6B;}
  .sync-status{font-size:12px;color:#55EFC4;display:flex;align-items:center;gap:5px;margin-right:auto;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#55EFC4;}
  .content{max-width:960px;margin:0 auto;padding:16px 20px 40px;min-height:0;}
  .card{background:#13131F;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #ffffff07;overflow:hidden;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:start;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px;}
  .stat-card{background:#13131F;border-radius:12px;padding:13px;text-align:center;border:1px solid #ffffff07;}
  .stat-label{font-size:12px;color:#555;margin-bottom:3px;}
  .stat-val{font-size:20px;font-weight:900;}
  .wallet-card{background:linear-gradient(135deg,#0E1E10,#0A1A0A);border:1px solid #55EFC430;border-radius:16px;padding:14px 18px;margin-bottom:12px;}
  .w-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:10px;}
  .w-item{background:#0A0A14;border-radius:12px;padding:11px 13px;}
  .w-label{font-size:12px;color:#555;margin-bottom:3px;}
  .w-val{font-size:18px;font-weight:900;}
  .w-sub{font-size:12px;color:#444;margin-top:2px;}
  .inp{padding:10px 14px;border-radius:10px;border:1px solid #ffffff12;background:#0A0A14;color:#E8E8F0;font-size:13px;font-family:'Heebo',sans-serif;width:100%;outline:none;}
  .btn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;}
  .btn-gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;}
  .btn-green{background:#55EFC4;color:#000;}
  .btn-red{background:none;border:1px solid #FF6B6B20;color:#FF6B6B88;cursor:pointer;border-radius:6px;padding:3px 8px;font-size:12px;font-family:'Heebo',sans-serif;}
  .btn-edit{background:none;border:1px solid #ffffff12;color:#666;cursor:pointer;border-radius:6px;padding:3px 8px;font-size:12px;font-family:'Heebo',sans-serif;}
  .txn-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #ffffff05;}
  .budget-bar-bg{background:#0A0A14;border-radius:5px;height:7px;overflow:hidden;margin-top:4px;}
  .budget-bar{height:100%;border-radius:5px;transition:width .4s;}
  .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .alert-box{background:#1A0808;border:1px solid #FF6B6B30;border-radius:14px;padding:12px 16px;margin-bottom:12px;position:relative;}
  .transfer-card{background:#0E1F0E;border:1px solid #55EFC425;border-radius:13px;padding:14px;margin-bottom:12px;}
  select.inp{cursor:pointer;}
  .pay-toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
  .pay-opt{padding:9px;border-radius:10px;border:1px solid #ffffff12;background:transparent;color:#555;cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;font-weight:600;transition:.15s;}

  /* ── Date Picker ── */
  .date-btn{padding:10px 14px;border-radius:10px;border:1px solid #ffffff12;background:#0A0A14;color:#E8E8F0;font-size:13px;font-family:'Heebo',sans-serif;width:100%;outline:none;cursor:pointer;text-align:right;}
  .date-btn.placeholder{color:#555;}
  .cal-modal{display:none;position:fixed;inset:0;background:#000000bb;z-index:2000;align-items:center;justify-content:center;}
  .cal-modal.open{display:flex;}
  .cal-box{background:#13131F;border-radius:18px;overflow:hidden;width:300px;box-shadow:0 20px 60px #000;}
  .cal-header{background:linear-gradient(135deg,#1a3a1a,#0E2A0E);padding:18px 16px 14px;text-align:center;}
  .cal-year{font-size:13px;color:#55EFC4;margin-bottom:4px;cursor:pointer;}
  .cal-month-nav{display:flex;align-items:center;justify-content:space-between;}
  .cal-nav-btn{background:none;border:none;color:#55EFC4;font-size:18px;cursor:pointer;padding:4px 8px;}
  .cal-month-name{font-size:20px;font-weight:800;color:#fff;}
  .cal-selected-day{font-size:32px;font-weight:900;color:#55EFC4;margin-top:6px;}
  .cal-body{padding:12px;}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px;}
  .cal-dow span{font-size:12px;color:#444;padding:4px 0;}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-day{padding:7px 0;text-align:center;border-radius:50%;cursor:pointer;font-size:13px;color:#888;background:none;border:none;font-family:'Heebo',sans-serif;transition:.15s;}
  .cal-day:hover{background:#55EFC420;color:#55EFC4;}
  .cal-day.today{color:#FFD700;font-weight:700;}
  .cal-day.selected{background:#55EFC4;color:#000;font-weight:800;}
  .cal-day.empty{cursor:default;}
  .cal-day.empty:hover{background:none;}
  .cal-footer{padding:8px 12px 12px;display:flex;justify-content:space-between;}
  .cal-clear{background:none;border:none;color:#FF6B6B88;cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;}
  .cal-cancel{background:none;border:none;color:#555;cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;}

  @media(max-width:600px){.grid2,.grid4{grid-template-columns:1fr 1fr;}.w-grid{grid-template-columns:1fr 1fr;}}
</style>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
      <div>
        <div class="topbar-title">💛🖤 ניהול תקציב אישי</div>

<div class="cal-modal" id="cal-modal" onclick="if(event.target===this)closeCal()">
  <div class="cal-box">
    <div class="cal-header">

<script>
const LS={wallet:"bgt_wallet",txns:"bgt_txns",income:"bgt_income",transfers:"bgt_transfers",debts:"bgt_debts",budgets:"bgt_budgets",futureIncome:"bgt_future_income"};
const lsGet=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const SYNC_URL="https://script.google.com/macros/s/AKfycbxsVKlcH7iGj4gXmpc6o-bAt_zLZ-WOO_AGx-im0CBCcU_nkZ-HEAcMyvzt8YC793ck/exec";

// ── syncPush with debounce ──
let _sQ={},_sTimer=null;
function syncPush(key,value){
  _sQ[key]=value;clearTimeout(_sTimer);
  _sTimer=setTimeout(async()=>{
    for(const[k,v]of Object.entries(_sQ)){
      try{const _vv=encodeURIComponent(JSON.stringify(v));const _cc=new AbortController();setTimeout(()=>_cc.abort(),6000);await fetch(`${SYNC_URL}?action=set&key=${encodeURIComponent(k)}&value=${_vv}`,{mode:"no-cors",signal:_cc.signal});}catch{}
      delete _sQ[k];
    }
  },2500);
}
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));syncPush(k,v);}catch{}};

// ── Smart merge by ID ──
function mergeArraysById(remote,local){
  const map={};
  for(const item of remote)map[item.id]=item;
  for(const item of local)if(!map[item.id])map[item.id]=item;
  return Object.values(map);
}
function mergeTxnsByMonth(remote,local){
  const merged={...remote};
  for(const m of Object.keys(local)){
    if(!merged[m]){merged[m]=local[m];}
    else{
      const byId={};
      for(const t of merged[m])byId[t.id]=t;
      for(const t of local[m])if(!byId[t.id])byId[t.id]=t;
      merged[m]=Object.values(byId);
    }
  }
  return merged;
}

async function syncAll(){
  try{
    document.getElementById("sync-text").textContent="מסנכרן...";
    document.getElementById("sync-dot").style.background="#FFD700";
    const r=await fetch(SYNC_URL);const d=await r.json();
    if(!d.ok)throw new Error();
    const rd=d.data||{};
    if(rd["bgt_txns"]){
      const remote=JSON.parse(rd["bgt_txns"]);
      const local=lsGet(LS.txns,{});
      allTxns=mergeTxnsByMonth(remote,local);
      localStorage.setItem(LS.txns,JSON.stringify(allTxns));
    }
    if(rd["bgt_income"]){
      const remote=JSON.parse(rd["bgt_income"]);
      const local=lsGet(LS.income,[]);
      income=mergeArraysById(remote,local);
      localStorage.setItem(LS.income,JSON.stringify(income));
    }
    if(rd["bgt_wallet"]){wallet=JSON.parse(rd["bgt_wallet"]);localStorage.setItem(LS.wallet,rd["bgt_wallet"]);}
    if(rd["bgt_transfers"]){
      const remote=JSON.parse(rd["bgt_transfers"]);
      const local=lsGet(LS.transfers,[]);
      transfers=mergeArraysById(remote,local);
      localStorage.setItem(LS.transfers,JSON.stringify(transfers));
    }
    if(rd["bgt_debts"]){
      const remote=JSON.parse(rd["bgt_debts"]);
      const local=lsGet(LS.debts,[]);
      debts=mergeArraysById(remote,local);
      localStorage.setItem(LS.debts,JSON.stringify(debts));
    }
    updateSyncStatus();renderAll();
  }catch{
    document.getElementById("sync-text").textContent="אין חיבור";
    document.getElementById("sync-dot").style.background="#FF6B6B";
    loadAll();
  }
}

const MONTHS_HE=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const COLORS={food:"#FF6B6B",transport:"#4ECDC4",hobbies:"#A29BFE",social:"#FD79A8",beitar:"#FFD700",savings:"#55EFC4",alcohol:"#E17055",other:"#636e72"};
const CAT_LABELS={food:"🍔 אוכל",transport:"🚂 תחבורה",hobbies:"🎮 תחביבים",social:"👥 חברה",beitar:"⚽ ביתר",savings:"💰 חיסכון",alcohol:"🍺 אלכוהול",other:"📦 אחר"};
let BUDGETS=lsGet("bgt_budgets",{food:200,social:150,beitar:200,transport:100,hobbies:100,alcohol:100,other:50});
const PAY_LABELS={cash:"💵 מזומן",credit:"💳 אשראי",bit:"🔵 ביט"};
const PAY_COLORS={cash:"#55EFC4",credit:"#4ECDC4",bit:"#6C9BFF"};
const W_NAMES={cash:"מזומן",bank:"בנק",bit:"ביט"};

function todayStr(){return new Date().toISOString().slice(0,10);}
function nowMonth(){const d=new Date();return`${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;}
function monthKey(s){try{const d=new Date(s);return`${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;}catch{return nowMonth();}}

function categorize(desc){
  const d=(desc||"").toLowerCase();
  if(/שוורמה|פלאפל|אוכל|מסעדה|קפה|סושי|פיצה|מאפה|עוגה|סנדוויץ|ארוחה|טעמי|מים/.test(d))return"food";
  if(/רכבת|אוטובוס|מונית|אוברה|גט|טקסי|דלק|נסיעה|רב.קו/.test(d))return"transport";
  if(/ביתר|ירושלים|אצטדיון/.test(d))return"beitar";
  if(/בירה|יין|וויסקי|אלכוהול|בר|פאב|קוקטייל|shots|shot/.test(d))return"alcohol";
  if(/חבר|חברה|בילוי|מסיבה|קולנוע|סרט/.test(d))return"social";
  if(/ספר|משחק|אוזניות|גיימינג|נטפליקס|ספוטיפיי/.test(d))return"hobbies";
  if(/חיסכון|שמירה/.test(d))return"savings";
  return"other";
}

let wallet={cash:1300,bank:1620,bit:0};
let debts=[];
let allTxns={};
let futureIncome=lsGet("bgt_future_income",null); // {amount, date, wallet}
let income=[];
let transfers=[];
let activeMonth=nowMonth();
let currentView="dashboard";
let pieChart=null,barChart=null,lineChart=null,heatChart=null,catCmpChart=null,savingChart=null,_chartsFirst=true;

function loadAll(){
  wallet=lsGet(LS.wallet,{cash:1300,bank:1620,bit:0});
  allTxns=lsGet(LS.txns,{});
  income=lsGet(LS.income,[]);
  transfers=lsGet(LS.transfers,[]);
  debts=lsGet(LS.debts,[]);
  BUDGETS=lsGet(LS.budgets,{food:200,social:150,beitar:200,transport:100,hobbies:100,alcohol:100,other:50});
  futureIncome=lsGet(LS.futureIncome,null);
  const months=Object.keys(allTxns);
  if(months.length>0&&!allTxns[activeMonth])activeMonth=months[months.length-1];
  updateSyncStatus();renderAll();
}

function updateSyncStatus(){
  document.getElementById("sync-text").textContent="מעודכן "+new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("sync-dot").style.background="#55EFC4";
}

function getBalances(){
  const cur=allTxns[activeMonth]||[];
  const ci=income.filter(i=>i.type==="cash").reduce((s,i)=>s+i.amount,0);
  const bi=income.filter(i=>i.type==="bank").reduce((s,i)=>s+i.amount,0);
  const bti=income.filter(i=>i.type==="bit").reduce((s,i)=>s+i.amount,0);
  const cs=cur.filter(t=>t.type==="cash"&&t.category!=="savings").reduce((s,t)=>s+t.amount,0);
  const bs=cur.filter(t=>t.type==="credit"&&t.category!=="savings").reduce((s,t)=>s+t.amount,0);
  const bts=cur.filter(t=>t.type==="bit"&&t.category!=="savings").reduce((s,t)=>s+t.amount,0);
  let ca=0,ba=0,bta=0;
  for(const tr of transfers){
    if(tr.from==="cash")ca-=tr.amount;if(tr.to==="cash")ca+=tr.amount;
    if(tr.from==="bank")ba-=tr.amount;if(tr.to==="bank")ba+=tr.amount;
    if(tr.from==="bit")bta-=tr.amount;if(tr.to==="bit")bta+=tr.amount;
  }
  return{
    cash:wallet.cash+ci-cs+ca,bank:wallet.bank+bi-bs+ba,bit:(wallet.bit||0)+bti-bts+bta,
    cashSpent:cs,bankSpent:bs,bitSpent:bts,
    cashIncome:ci,bankIncome:bi,bitIncome:bti,
    totalSpent:cur.filter(t=>t.category!=="savings").reduce((s,t)=>s+t.amount,0),
    totalSaved:income.filter(i=>monthKey(i.date)===activeMonth).reduce((s,i)=>s+i.amount,0)-cur.filter(t=>t.category!=="savings").reduce((s,t)=>s+t.amount,0),
    cur
  };
}

function byCat(txns){
  const r={};
  for(const t of txns)if(t.category!=="savings")r[t.category]=(r[t.category]||0)+t.amount;
  return r;
}

function setView(v){
  currentView=v;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+v)?.classList.add("active");
  renderAll();
}

function setMonth(m){
  activeMonth=m;
  document.querySelectorAll(".month-btn").forEach(b=>{b.classList.toggle("active",b.dataset.month===m);});
  renderAll();
}

function deleteMonth(m,e){
  e.stopPropagation();
  if(!confirm(`למחוק את כל נתוני ${m}?`))return;
  delete allTxns[m];
  lsSet(LS.txns,allTxns);
  if(activeMonth===m){
    const months=Object.keys(allTxns);
    activeMonth=months.length>0?months[months.length-1]:nowMonth();
  }
  renderAll();
}

function renderAll(){
  renderMonthTabs();
  const{cash,bank,bit,cashSpent,bankSpent,bitSpent,cashIncome,bankIncome,bitIncome,totalSpent,totalSaved,cur}=getBalances();
  const total=cash+bank+bit;
  const cats=byCat(cur);
  const maxCat=Math.max(1,...Object.values(cats));
  const yearTxns=Object.values(allTxns).flat();
  const yearCats=byCat(yearTxns);
  const yearSpent=yearTxns.filter(t=>t.category!=="savings").reduce((s,t)=>s+t.amount,0);
  const alerts=Object.entries(cats).filter(([k,v])=>k!=="savings"&&BUDGETS[k]&&v>BUDGETS[k]);
  const content=document.getElementById("main-content");

  let walletHtml=`
    <div class="wallet-card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:12px;color:#55EFC4;font-weight:700;">💳 יתרות נוכחיות</div>
        <button class="btn-edit" onclick="openWalletModal()">✏️ עדכן</button>
      </div>
      <div class="w-grid">
        ${[{l:"💵 מזומן",v:cash,s:`−${cashSpent}₪`,c:"#55EFC4"},{l:"🏦 בנק",v:bank,s:`−${bankSpent}₪`,c:"#4ECDC4"},{l:"🔵 ביט",v:bit,s:`−${bitSpent}₪`,c:"#6C9BFF"},(()=>{
        const fi2=lsGet("bgt_future_income",null);

        const displayVal=fiAmt>0?total+"<br><span style=\"font-size:13px;color:#FFD70088;font-weight:600;\">(+"+(total+fiAmt)+"₪)</span>":total;

function handleCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const text=ev.target.result.replace(/^\uFEFF/,"");
    const delim=text.split(/\r?\n/)[0].includes(";")?";":",";
    const lines=text.trim().split(/\r?\n/);
    const results=[];
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const cols=lines[i].split(delim).map(c=>c.trim().replace(/"/g,""));
      const rawDate=cols[0]||"",rawDesc=cols[1]||"עסקה",rawAmt=cols[2]||"";
      let date=rawDate.replace(/\./g,"/");
      const dm=date.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
      if(dm)date=`${dm[3].length===2?"20"+dm[3]:dm[3]}-${dm[2].padStart(2,"0")}-${dm[1].padStart(2,"0")}`;
      const amount=Math.abs(parseFloat(rawAmt.replace(/[₪,\s]/g,"")));
      if(!isNaN(amount)&&amount>0&&date)results.push({id:Date.now()+i,date,desc:rawDesc,amount,category:categorize(rawDesc),type:"credit"});
    }
    if(results.length===0){const s=document.getElementById("csv-status");s.style.display="block";s.style.color="#FF6B6B";s.textContent="❌ לא נמצאו עסקאות";return;}
    const month=monthKey(results[0].date);
    if(!allTxns[month])allTxns[month]=[];
    allTxns[month]=[...(allTxns[month]||[]),...results];
    lsSet(LS.txns,allTxns);activeMonth=month;
    const s=document.getElementById("csv-status");s.style.display="block";s.style.color="#55EFC4";s.textContent=`✅ יובאו ${results.length} עסקאות — ${month}`;
    renderAll();
  };
  reader.readAsText(file,"utf-8");e.target.value="";
}

let _calTarget=null,_calValTarget=null,_calYear=null,_calMonth=null,_calSelected=null;
const CAL_DAYS_HE=["א","ב","ג","ד","ה","ו","ש"];

function openCal(btnId,valId){
  _calTarget=btnId;_calValTarget=valId;
  const existing=document.getElementById(valId)?.value;
  const d=existing?new Date(existing):new Date();
  _calYear=d.getFullYear();_calMonth=d.getMonth();
  _calSelected=existing||null;
  renderCal();
  document.getElementById('cal-modal').classList.add('open');
}
function closeCal(){document.getElementById('cal-modal').classList.remove('open');}
function clearCal(){
  if(_calValTarget)document.getElementById(_calValTarget).value="";
  if(_calTarget){const b=document.getElementById(_calTarget);if(b){b.textContent="📅 בחר תאריך";b.classList.add("placeholder");}}
  closeCal();
}
function calPrevMonth(){_calMonth--;if(_calMonth<0){_calMonth=11;_calYear--;}renderCal();}
function calNextMonth(){_calMonth++;if(_calMonth>11){_calMonth=0;_calYear++;}renderCal();}
function cyclYear(){
  const y=parseInt(prompt("הכנס שנה:",_calYear));
  if(y&&y>2000&&y<2100){_calYear=y;renderCal();}
}
function renderCal(){
  document.getElementById('cal-year-label').textContent=_calYear;
  document.getElementById('cal-month-label').textContent=MONTHS_HE[_calMonth];
  if(_calSelected){
    const sd=new Date(_calSelected);
    document.getElementById('cal-selected-label').textContent=`${sd.getDate()} ב${MONTHS_HE[sd.getMonth()]}`;
  } else {
    document.getElementById('cal-selected-label').textContent="בחר יום";
  }
  const firstDay=new Date(_calYear,_calMonth,1).getDay();
  const daysInMonth=new Date(_calYear,_calMonth+1,0).getDate();
  const today=todayStr();
  let html="";
  // empty cells before first day (Sunday=0)
  for(let i=0;i<firstDay;i++)html+=`<button class="cal-day empty"></button>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${_calYear}-${String(_calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday=ds===today;
    const isSel=ds===_calSelected;
    html+=`<button class="cal-day${isToday?" today":""}${isSel?" selected":""}" onclick="selectCalDay('${ds}')">${d}</button>`;
  }
  document.getElementById('cal-days').innerHTML=html;
}
function selectCalDay(ds){
  _calSelected=ds;
  if(_calValTarget)document.getElementById(_calValTarget).value=ds;
  if(_calTarget){
    const b=document.getElementById(_calTarget);
    if(b){
      const d=new Date(ds);
      b.textContent=`📅 ${d.getDate()} ${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;
      b.classList.remove("placeholder");
    }
  }
  renderCal();
  setTimeout(closeCal,200);
}

function checkDashboardReminder(){

    const now=new Date();
    if(now.getHours()*60+now.getMinutes()<hh*60+mm)return;
    const ds=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
    if(localStorage.getItem("bgt_reminded_"+ds))return;
    const allT=JSON.parse(localStorage.getItem("bgt_txns")||"{}");
    if(Object.values(allT).flat().some(t=>t.date===ds))return;

      <div><div style="font-size:12px;color:#888;margin-bottom:5px;">🏦 בנק</div><input class="inp" id="w-bank" type="number" placeholder="0"></div>
      <div><div style="font-size:12px;color:#888;margin-bottom:5px;">🔵 ביט</div><input class="inp" id="w-bit" type="number" placeholder="0"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green" onclick="saveWallet()" style="flex:1;">שמור ✓</button>
      <button class="btn" onclick="closeWalletModal()" style="background:#1a1a2e;color:#888;border:1px solid #ffffff12;">ביטול</button>
    </div>
  </div>
</div>

<!-- EDIT TRANSACTION MODAL -->
<div id="edit-txn-modal" style="display:none;position:fixed;inset:0;background:#000000bb;z-index:1001;align-items:center;justify-content:center;">
  <div style="background:#13131F;border:1px solid #4ECDC430;border-radius:16px;padding:20px;width:90%;max-width:480px;">
    <div style="font-size:14px;font-weight:700;color:#4ECDC4;margin-bottom:14px;">✏️ עריכת הוצאה</div>
    <input type="hidden" id="edit-txn-id"><input type="hidden" id="edit-txn-month">
    <div style="display:grid;gap:10px;margin-bottom:14px;">
      <input class="inp" id="edit-txn-desc" placeholder="תיאור">
      <input class="inp" id="edit-txn-amount" type="number" placeholder="סכום ₪">
      <input class="inp" id="edit-txn-date" type="date">
      <select class="inp" id="edit-txn-cat"><option value="food">🍔 אוכל</option><option value="transport">🚂 תחבורה</option><option value="hobbies">🎮 תחביבים</option><option value="social">👥 חברה</option><option value="beitar">⚽ ביתר</option><option value="savings">💰 חיסכון</option><option value="alcohol">🍺 אלכוהול</option><option value="other">📦 אחר</option></select>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <button class="pay-opt" id="ettype-cash" onclick="setEditTxnType('cash')" style="border-color:#55EFC4;background:#55EFC420;color:#55EFC4;">💵 מזומן</button>
        <button class="pay-opt" id="ettype-credit" onclick="setEditTxnType('credit')" style="border-color:#ffffff12;background:transparent;color:#aaa;">💳 אשראי</button>
        <button class="pay-opt" id="ettype-bit" onclick="setEditTxnType('bit')" style="border-color:#ffffff12;background:transparent;color:#aaa;">🔵 ביט</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green" onclick="saveEditTxn()" style="flex:1;">שמור ✓</button>
      <button class="btn" onclick="document.getElementById('edit-txn-modal').style.display='none'" style="background:#1a1a2e;color:#888;border:1px solid #ffffff12;">ביטול</button>
    </div>
  </div>
</div>

<!-- EDIT INCOME MODAL -->
<div id="edit-inc-modal" style="display:none;position:fixed;inset:0;background:#000000bb;z-index:1001;align-items:center;justify-content:center;">
  <div style="background:#13131F;border:1px solid #55EFC430;border-radius:16px;padding:20px;width:90%;max-width:480px;">
    <div style="font-size:14px;font-weight:700;color:#55EFC4;margin-bottom:14px;">✏️ עריכת הכנסה</div>
    <input type="hidden" id="edit-inc-id">
    <div style="display:grid;gap:10px;margin-bottom:14px;">
      <input class="inp" id="edit-inc-desc" placeholder="תיאור">

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <button class="pay-opt" id="eintype-cash" onclick="setEditIncType('cash')" style="border-color:#55EFC4;background:#55EFC420;color:#55EFC4;">💵 מזומן</button>
        <button class="pay-opt" id="eintype-bank" onclick="setEditIncType('bank')" style="border-color:#ffffff12;background:transparent;color:#aaa;">🏦 בנק</button>
        <button class="pay-opt" id="eintype-bit" onclick="setEditIncType('bit')" style="border-color:#ffffff12;background:transparent;color:#aaa;">🔵 ביט</button>

    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green" onclick="saveEditIncome()" style="flex:1;">שמור ✓</button>

  </div>
</div>
