<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>דשבורד תקציב ⚽💛🖤</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Heebo',sans-serif;direction:rtl;background:#0A0A14;color:#E8E8F0;height:100vh;overflow-y:auto;overflow-x:hidden;}
  .topbar{background:linear-gradient(160deg,#0D0D1F,#111230,#0E1E3A);border-bottom:1px solid #ffffff0c;padding:16px 20px 12px;}
  .topbar-inner{max-width:960px;margin:0 auto;}
  .topbar-title{font-size:10px;letter-spacing:4px;color:#FFD700;font-weight:700;margin-bottom:3px;}
  .topbar-h1{font-size:22px;font-weight:900;color:#fff;margin:0;}
  .topbar-row2{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;}
  .nav-btn{padding:5px 12px;border-radius:14px;border:1px solid #ffffff18;background:transparent;color:#555;cursor:pointer;font-size:11px;font-family:'Heebo',sans-serif;transition:.15s;}
  .nav-btn.active{border-color:#FFD700;background:#FFD70015;color:#FFD700;}
  .month-btn{padding:4px 11px;border-radius:12px;border:1px solid #ffffff12;background:transparent;color:#555;cursor:pointer;font-size:11px;font-family:'Heebo',sans-serif;transition:.15s;}
  .month-btn.active{border-color:#4ECDC4;background:#4ECDC412;color:#4ECDC4;}
  .sync-status{font-size:10px;color:#55EFC4;display:flex;align-items:center;gap:5px;margin-right:auto;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#55EFC4;}
  .content{max-width:960px;margin:0 auto;padding:16px 20px 40px;min-height:0;}
  .card{background:#13131F;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #ffffff07;overflow:hidden;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:start;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px;}
  .stat-card{background:#13131F;border-radius:12px;padding:13px;text-align:center;border:1px solid #ffffff07;}
  .stat-label{font-size:10px;color:#555;margin-bottom:3px;}
  .stat-val{font-size:20px;font-weight:900;}
  .wallet-card{background:linear-gradient(135deg,#0E1E10,#0A1A0A);border:1px solid #55EFC430;border-radius:16px;padding:14px 18px;margin-bottom:12px;}
  .w-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:10px;}
  .w-item{background:#0A0A14;border-radius:12px;padding:11px 13px;}
  .w-label{font-size:10px;color:#555;margin-bottom:3px;}
  .w-val{font-size:18px;font-weight:900;}
  .w-sub{font-size:10px;color:#444;margin-top:2px;}
  .inp{padding:10px 14px;border-radius:10px;border:1px solid #ffffff12;background:#0A0A14;color:#E8E8F0;font-size:13px;font-family:'Heebo',sans-serif;width:100%;outline:none;}
  .btn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;}
  .btn-gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;}
  .btn-green{background:#55EFC4;color:#000;}
  .btn-red{background:none;border:1px solid #FF6B6B20;color:#FF6B6B88;cursor:pointer;border-radius:6px;padding:3px 8px;font-size:11px;font-family:'Heebo',sans-serif;}
  .btn-edit{background:none;border:1px solid #ffffff12;color:#666;cursor:pointer;border-radius:6px;padding:3px 8px;font-size:11px;font-family:'Heebo',sans-serif;}
  .txn-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #ffffff05;}
  .budget-bar-bg{background:#0A0A14;border-radius:5px;height:7px;overflow:hidden;margin-top:4px;}
  .budget-bar{height:100%;border-radius:5px;transition:width .4s;}
  .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .alert-box{background:#1A0808;border:1px solid #FF6B6B30;border-radius:14px;padding:12px 16px;margin-bottom:12px;position:relative;}
  .transfer-card{background:#0E1F0E;border:1px solid #55EFC425;border-radius:13px;padding:14px;margin-bottom:12px;}
  select.inp{cursor:pointer;}
  .pay-toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
  .pay-opt{padding:9px;border-radius:10px;border:1px solid #ffffff12;background:transparent;color:#555;cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;font-weight:600;transition:.15s;}
  @media(max-width:600px){.grid2,.grid4{grid-template-columns:1fr 1fr;}.w-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
      <div>
        <div class="topbar-title">💛🖤 ניהול תקציב אישי</div>
        <h1 class="topbar-h1">דשבורד ההוצאות שלי</h1>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">טוען...</span></div>
        <button class="nav-btn active" onclick="setView('dashboard')" id="nav-dashboard">📊 סקירה</button>
        <button class="nav-btn" onclick="setView('income')" id="nav-income">💵 הכנסות</button>
        <button class="nav-btn" onclick="setView('transactions')" id="nav-transactions">📋 עסקאות</button>
        <button class="nav-btn" onclick="setView('add')" id="nav-add">➕ הוסף</button>
        <button class="nav-btn" onclick="setView('debts')" id="nav-debts">💳 חובות</button>
        <button class="nav-btn" onclick="syncAll()">🔄 סנכרן</button>
        <a href="index.html" class="nav-btn" style="text-decoration:none;background:#FFD70015;border-color:#FFD700;color:#FFD700;">💬 חזור לצ'אט</a>
      </div>
    </div>
    <div class="topbar-row2" id="month-tabs"></div>
  </div>
</div>

<div class="content" id="main-content"></div>

<div id="wallet-modal" style="display:none;position:fixed;inset:0;background:#000000aa;z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#13131F;border:1px solid #55EFC430;border-radius:16px;padding:20px;width:90%;max-width:480px;margin:0 auto;">
    <div style="font-size:14px;font-weight:700;color:#55EFC4;margin-bottom:14px;">✏️ עדכון יתרות התחלתיות</div>
    <div style="display:grid;gap:12px;margin-bottom:14px;">
      <div>
        <div style="font-size:11px;color:#888;margin-bottom:5px;">💵 מזומן</div>
        <input class="inp" id="w-cash" type="number" placeholder="0">
      </div>
      <div>
        <div style="font-size:11px;color:#888;margin-bottom:5px;">🏦 בנק</div>
        <input class="inp" id="w-bank" type="number" placeholder="0">
      </div>
      <div>
        <div style="font-size:11px;color:#888;margin-bottom:5px;">🔵 ביט</div>
        <input class="inp" id="w-bit" type="number" placeholder="0">
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green" onclick="saveWallet()" style="flex:1;">שמור ✓</button>
      <button class="btn" onclick="closeWalletModal()" style="background:#1a1a2e;color:#888;border:1px solid #ffffff12;">ביטול</button>
    </div>
  </div>
</div>

<script>
// (כאן נמצא כל ה-JS המאוחד משלושת החלקים ששלחת)
const LS={wallet:"bgt_wallet",txns:"bgt_txns",income:"bgt_income",transfers:"bgt_transfers",debts:"bgt_debts"};
const lsGet=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const SYNC_URL="https://script.google.com/macros/s/AKfycbxsVKlcH7iGj4gXmpc6o-bAt_zLZ-WOO_AGx-im0CBCcU_nkZ-HEAcMyvzt8YC793ck/exec";

async function syncPush(key,value){try{await fetch(SYNC_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key,value:JSON.stringify(value)})})}catch{}}
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));syncPush(k,v);}catch{}};

const MONTHS_HE=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const COLORS={food:"#FF6B6B",transport:"#4ECDC4",hobbies:"#A29BFE",social:"#FD79A8",beitar:"#FFD700",savings:"#55EFC4",other:"#636e72"};
const CAT_LABELS={food:"🍔 אוכל",transport:"🚂 תחבורה",hobbies:"🎮 תחביבים",social:"👥 חברה",beitar:"⚽ ביתר",savings:"💰 חיסכון",other:"📦 אחר"};
const BUDGETS={food:200,social:150,beitar:200,transport:100,hobbies:100,other:50};
const PAY_LABELS={cash:"💵 מזומן",credit:"💳 אשראי",bit:"🔵 ביט"};
const PAY_COLORS={cash:"#55EFC4",credit:"#4ECDC4",bit:"#6C9BFF"};
const W_NAMES={cash:"מזומן",bank:"בנק",bit:"ביט"};

let wallet={cash:1300,bank:1620,bit:0}, debts=[], allTxns={}, income=[], transfers=[];
let activeMonth=nowMonth(), currentView="dashboard", pieChart=null, barChart=null;

function nowMonth(){const d=new Date();return`${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;}
function todayStr(){return new Date().toISOString().slice(0,10);}
function monthKey(s){try{const d=new Date(s);return`${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;}catch{return nowMonth();}}

async function syncAll(){
  try{
    document.getElementById("sync-text").textContent="מסנכרן...";
    document.getElementById("sync-dot").style.background="#FFD700";
    const r=await fetch(SYNC_URL);const d=await r.json();
    if(!d.ok)throw new Error();
    const rd=d.data||{};
    if(rd["bgt_txns"]){allTxns=JSON.parse(rd["bgt_txns"]); localStorage.setItem(LS.txns,rd["bgt_txns"]);}
    if(rd["bgt_income"]){income=JSON.parse(rd["bgt_income"]); localStorage.setItem(LS.income,rd["bgt_income"]);}
    if(rd["bgt_wallet"]){wallet=JSON.parse(rd["bgt_wallet"]); localStorage.setItem(LS.wallet,rd["bgt_wallet"]);}
    if(rd["bgt_transfers"]){transfers=JSON.parse(rd["bgt_transfers"]); localStorage.setItem(LS.transfers,rd["bgt_transfers"]);}
    if(rd["bgt_debts"]){debts=JSON.parse(rd["bgt_debts"]); localStorage.setItem(LS.debts,rd["bgt_debts"]);}
    updateSyncStatus(); renderAll();
  }catch{
    document.getElementById("sync-text").textContent="אין חיבור";
    document.getElementById("sync-dot").style.background="#FF6B6B";
  }
}

function updateSyncStatus(){
  document.getElementById("sync-text").textContent="מעודכן " + new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("sync-dot").style.background="#55EFC4";
}

function getBalances(){
  const cur=allTxns[activeMonth]||[];
  const ci=income.filter(i=>i.type==="cash").reduce((s,i)=>s+i.amount,0);
  const bi=income.filter(i=>i.type==="bank").reduce((s,i)=>s+i.amount,0);
  const bti=income.filter(i=>i.type==="bit").reduce((s,i)=>s+i.amount,0);
  const cs=cur.filter(t=>t.type==="cash"&&t.category!=="savings").reduce((s,t)=>s+t.amount,0);
  const bs=cur.filter(t=>t.type==="credit"&&t.category!=="savings").reduce((s,t)=>s+t.amount,0);
  const bts=cur.filter(t=>t.type==="bit"&&t.category!=="savings").reduce((s,t)=>s+t.amount,0);
  let ca=0,ba=0,bta=0;
  for(const tr of transfers){
    if(tr.from==="cash")ca-=tr.amount;if(tr.to==="cash")ca+=tr.amount;
    if(tr.from==="bank")ba-=tr.amount;if(tr.to==="bank")ba+=tr.amount;
    if(tr.from==="bit")bta-=tr.amount;if(tr.to==="bit")bta+=tr.amount;
  }
  return{
    cash:wallet.cash+ci-cs+ca,bank:wallet.bank+bi-bs+ba,bit:(wallet.bit||0)+bti-bts+bta,
    cashSpent:cs,bankSpent:bs,bitSpent:bts,
    totalSpent:cur.filter(t=>t.category!=="savings").reduce((s,t)=>s+t.amount,0),
    totalSaved:cur.filter(t=>t.category==="savings").reduce((s,t)=>s+t.amount,0),
    cur, cashIncome:ci, bankIncome:bi, bitIncome:bti
  };
}

function renderAll(){
  renderMonthTabs();
  const bal=getBalances();
  const cats=bal.cur.reduce((r,t)=>{if(t.category!=="savings")r[t.category]=(r[t.category]||0)+t.amount;return r;},{});
  const alerts=Object.entries(cats).filter(([k,v])=>BUDGETS[k]&&v>BUDGETS[k]);
  const content=document.getElementById("main-content");
  
  let walletHtml=`<div class="wallet-card"><div style="display:flex;justify-content:space-between;align-items:center;"><div style="font-size:12px;color:#55EFC4;font-weight:700;">💳 יתרות נוכחיות</div><button class="btn-edit" onclick="openWalletModal()">✏️ עדכן</button></div><div class="w-grid">${[{l:"💵 מזומן",v:bal.cash,c:"#55EFC4",s:`−${bal.cashSpent}`},{l:"🏦 בנק",v:bal.bank,c:"#4ECDC4",s:`−${bal.bankSpent}`},{l:"🔵 ביט",v:bal.bit,c:"#6C9BFF",s:`−${bal.bitSpent}`},{l:"💰 סה״כ",v:bal.cash+bal.bank+bal.bit,c:"#FFD700",s:bal.cash+bal.bank+bal.bit>=0?"✅":"⚠️"}].map(b=>`<div class="w-item" style="border:1px solid ${b.c}18;"><div class="w-label">${b.l}</div><div class="w-val" style="color:${b.c};">${b.v}₪</div><div class="w-sub">${b.s}</div></div>`).join("")}</div></div>`;

  let alertHtml=alerts.length?`<div class="alert-box"><div style="font-size:12px;font-weight:700;color:#FF6B6B;margin-bottom:5px;">🚨 חריגה — ${activeMonth}</div>${alerts.map(([k,v])=>`<div style="font-size:12px;color:#ffaaaa;">${CAT_LABELS[k]}: חרגת ב-<b style="color:#FF6B6B">${v-BUDGETS[k]}₪</b></div>`).join("")}</div>`:"";

  let viewHtml="";
  if(currentView==="dashboard"){
    viewHtml+=`<div class="grid4">${[{l:"סה״כ הוצאות",v:bal.totalSpent,i:"💸",c:"#FF6B6B"},{l:"נחסך",v:bal.totalSaved,i:"💰",c:"#55EFC4"},{l:"עסקאות",v:bal.cur.length,i:"📝",c:"#A29BFE"},{l:"⚽ ביתר",v:cats.beitar||0,i:"🟡",c:"#FFD700"}].map(k=>`<div class="stat-card"><div style="font-size:18px;">${k.i}</div><div class="stat-val" style="color:${k.c}">${k.v}₪</div><div class="stat-label">${k.l}</div></div>`).join("")}</div><div class="grid2"><div class="card"><canvas id="pie-chart" height="160"></canvas></div><div class="card"><canvas id="bar-chart" height="160"></canvas></div></div>`;
  }
  // (שאר לוגיקת ה-Views מהחלקים הקודמים תכנס כאן בהתאם)

  content.innerHTML = walletHtml + alertHtml + viewHtml;
  initCharts(cats);
}

function initCharts(cats){
  if(currentView!=="dashboard")return;
  const pieCtx=document.getElementById("pie-chart")?.getContext("2d");
  if(pieCtx) pieChart=new Chart(pieCtx,{type:"doughnut",data:{labels:Object.keys(cats).map(k=>CAT_LABELS[k]),datasets:[{data:Object.values(cats),backgroundColor:Object.keys(cats).map(k=>COLORS[k])}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
}

function renderMonthTabs(){
  const months=Object.keys(allTxns).length?Object.keys(allTxns):[nowMonth()];
  document.getElementById("month-tabs").innerHTML=months.map(m=>`<button class="month-btn${m===activeMonth?" active":""}" onclick="setMonth('${m}')">${m}</button>`).join("");
}
function setMonth(m){activeMonth=m; renderAll();}
function setView(v){currentView=v; document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.id==="nav-"+v)); renderAll();}

// --- Actions ---
function openWalletModal(){ document.getElementById("w-cash").value=wallet.cash; document.getElementById("w-bank").value=wallet.bank; document.getElementById("w-bit").value=wallet.bit; document.getElementById("wallet-modal").style.display="flex"; }
function closeWalletModal(){ document.getElementById("wallet-modal").style.display="none"; }
function saveWallet(){ wallet={cash:parseFloat(document.getElementById("w-cash").value), bank:parseFloat(document.getElementById("w-bank").value), bit:parseFloat(document.getElementById("w-bit").value)}; lsSet(LS.wallet,wallet); closeWalletModal(); renderAll(); }

// --- Auto Sync ---
setInterval(()=>{ 
  allTxns=lsGet(LS.txns,{}); income=lsGet(LS.income,[]); transfers=lsGet(LS.transfers,[]); debts=lsGet(LS.debts,[]); wallet=lsGet(LS.wallet,wallet); 
  renderAll(); 
},5000);

(async()=>{ await syncAll(); if(!Object.keys(allTxns).length) renderAll(); setInterval(syncAll,30000); })();
</script>
</body>
</html>
