<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>בוט תקציב ⚽💛🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Heebo', sans-serif; direction: rtl; background: #0A0A14; color: #E8E8F0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; max-width: 430px; margin: 0 auto; }
        #topbar { background: linear-gradient(135deg, #0D1F0D, #0A1A0A); border-bottom: 1px solid #FFD70022; padding: 11px 14px 9px; flex-shrink: 0; }
        #topbar .inner { display: flex; align-items: center; gap: 10px; }
        #avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #FFD700, #FFA500); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
        #botname { font-size: 13px; font-weight: 800; color: #fff; }
        #syncstatus { font-size: 9px; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        #syncdot { width: 5px; height: 5px; border-radius: 50%; background: #55EFC4; flex-shrink: 0; }
        #tabs { display: flex; gap: 5px; margin-right: auto; align-items: center; }
        .tab { padding: 5px 9px; border-radius: 11px; border: 1px solid #ffffff15; background: transparent; color: #555; cursor: pointer; font-size: 12px; transition: .2s; }
        .tab.active { border-color: #FFD700; background: #FFD70018; color: #FFD700; }
        
        /* כפתור דשבורד בולט */
        .dash-link { background: #FFD700; color: #000; padding: 6px 12px; border-radius: 10px; text-decoration: none; font-weight: 900; font-size: 11px; margin-left: 5px; }

        .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .view.active { display: flex; }
        #messages { flex: 1; overflow-y: auto; padding: 10px 11px 0; display: flex; flex-direction: column; gap: 7px; }
        .bubble-wrap { display: flex; flex-direction: column; position: relative; margin-bottom: 4px; }
        .bubble-wrap.user { align-items: flex-start; }
        .bubble-wrap.bot { align-items: flex-end; }
        .bubble { max-width: 85%; padding: 10px 14px; font-size: 14px; line-height: 1.5; border-radius: 18px; }
        .bubble.user { background: #1a2a3a; border-bottom-right-radius: 4px; border: 1px solid #4ECDC420; }
        .bubble.bot { background: #1a1a0a; border-bottom-left-radius: 4px; border: 1px solid #FFD70020; }
        .btime { font-size: 9px; color: #444; margin-top: 2px; }

        /* Summary UI - החזרתי את העיצוב מהתמונה שלך */
        .sum-inner { padding: 15px; overflow-y: auto; }
        .bal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .bal-card { background: #13131F; border-radius: 12px; padding: 12px 5px; text-align: center; border: 1px solid #ffffff08; }
        .bal-label { font-size: 10px; color: #666; margin-bottom: 4px; }
        .bal-val { font-size: 15px; font-weight: 800; color: #fff; }
        .scard { background: #13131F; border-radius: 14px; padding: 15px; margin-bottom: 10px; border: 1px solid #ffffff05; }
        .scard-title { font-size: 12px; font-weight: 700; color: #888; margin-bottom: 12px; border-bottom: 1px solid #ffffff05; padding-bottom: 5px; }
        .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .cat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .cat-name { flex: 1; font-size: 12px; color: #bbb; }
        .cat-val { font-size: 13px; font-weight: 700; }

        #inputrow { padding: 10px 11px 20px; display: flex; gap: 8px; background: #0A0A14; }
        #msginput { flex: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid #ffffff13; background: #13131F; color: #fff; outline: none; }
        #sendbtn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #FFD700; color: #000; font-weight: bold; cursor: pointer; }
        #quickrow { padding: 5px 11px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
        .quick { padding: 6px 12px; border-radius: 15px; background: #13131F; border: 1px solid #ffffff10; color: #888; white-space: nowrap; font-size: 11px; }
    </style>
</head>
<body>

<div id="topbar">
  <div class="inner">
    <div id="avatar">⚽</div>
    <div>
      <div id="botname">בוט התקציב 💛🖤</div>
      <div id="syncstatus"><div id="syncdot" style="width:6px;height:6px;background:#55EFC4;border-radius:50%"></div><span id="synctext" style="color:#55EFC4;margin-right:4px">מוכן</span></div>
    </div>
    <div id="tabs">
      <a href="index.html" class="dash-link">דשבורד</a>
      <button class="tab active" data-view="chat" onclick="switchView('chat')">💬</button>
      <button class="tab" data-view="summary" onclick="switchView('summary')">📊</button>
      <button class="tab" data-view="install" onclick="switchView('install')">📲</button>
    </div>
  </div>
</div>

<div id="chat-view" class="view active">
  <div id="messages"></div>
  <div id="quickrow">
    <button class="quick" onclick="setQuick('אכלתי שוורמה ב-38')">🌯 שוורמה</button>
    <button class="quick" onclick="setQuick('נסעתי ברכבת ב-22')">🚂 רכבת</button>
    <button class="quick" onclick="setQuick('כמה הוצאתי החודש?')">📊 סיכום</button>
  </div>
  <div id="inputrow">
    <input id="msginput" type="text" placeholder="מה קנית עכשיו?" onkeydown="if(event.key==='Enter')send()">
    <button id="sendbtn" onclick="send()">➤</button>
  </div>
</div>

<div id="summary-view" class="view">
  <div class="sum-inner" id="summary-content">
      </div>
</div>

<div id="install-view" class="view">
    <div style="padding:20px; text-align:center;">
        <p>הגדרות מערכת</p>
        <input id="apikey-input" type="password" placeholder="מפתח API..." style="width:100%; margin-top:10px; padding:10px; border-radius:8px; background:#13131F; color:#fff; border:1px solid #333;">
        <button onclick="saveApiKey()" style="width:100%; margin-top:10px; padding:10px; background:#FFD700; border:none; border-radius:8px; font-weight:bold;">שמור</button>
    </div>
</div>

<script>
const LS = { wallet: "bgt_wallet", txns: "bgt_txns", apikey: "bgt_apikey", chatHistory: "bgt_chat_history" };
const lsGet = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const lsSet = (k, v) => { localStorage.setItem(k, JSON.stringify(v)); };

const COLORS = { food: "#FF6B6B", transport: "#4ECDC4", beitar: "#FFD700", other: "#A29BFE" };
const CAT_LABELS = { food: "🍔 אוכל", transport: "🚂 תחבורה", beitar: "⚽ ביתר", other: "📦 אחר" };

let wallet = lsGet(LS.wallet, { cash: 0, bank: 0, bit: 0 });
let txns = lsGet(LS.txns, {});
let apiKey = lsGet(LS.apikey, null);

function nowMonth() { const d = new Date(); return `${["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"][d.getMonth()]} ${d.getFullYear()}`; }

function getBalances() {
    const cur = txns[nowMonth()] || [];
    const sum = (type) => cur.filter(t => t.type === type).reduce((s, x) => s + x.amount, 0);
    return {
        cash: wallet.cash - sum("cash"),
        bank: wallet.bank - sum("credit"),
        bit: wallet.bit - sum("bit"),
        currentTxns: cur
    };
}

function renderSummary() {
    const bal = getBalances();
    const cats = bal.currentTxns.reduce((acc, t) => { 
        const c = t.category || 'other';
        acc[c] = (acc[c] || 0) + t.amount; 
        return acc; 
    }, {});

    document.getElementById("summary-content").innerHTML = `
        <div class="bal-grid">
            <div class="bal-card"><div class="bal-label">מזומן</div><div class="bal-val">${bal.cash}₪</div></div>
            <div class="bal-card"><div class="bal-label">בנק</div><div class="bal-val">${bal.bank}₪</div></div>
            <div class="bal-card"><div class="bal-label">ביט</div><div class="bal-val">${bal.bit}₪</div></div>
        </div>
        <div class="scard">
            <div class="scard-title">הוצאות לפי קטגוריה</div>
            ${Object.entries(cats).map(([c, v]) => `
                <div class="cat-row">
                    <div class="cat-dot" style="background:${COLORS[c] || COLORS.other}"></div>
                    <div class="cat-name">${CAT_LABELS[c] || c}</div>
                    <div class="cat-val">${v}₪</div>
                </div>
            `).join('')}
        </div>
    `;
}

function switchView(v) {
    document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
    document.getElementById(v + "-view").classList.add("active");
    if(v !== 'install') document.querySelector(`[data-view="${v}"]`).classList.add("active");
    if(v === "summary") renderSummary();
}

function addBotMsg(text) {
    const m = document.getElementById("messages");
    const w = document.createElement("div"); w.className = "bubble-wrap bot";
    w.innerHTML = `<div class="bubble bot">${text}</div><div class="btime">${new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}</div>`;
    m.appendChild(w); m.scrollTop = m.scrollHeight;
}

function addUserMsg(text) {
    const m = document.getElementById("messages");
    const w = document.createElement("div"); w.className = "bubble-wrap user";
    w.innerHTML = `<div class="bubble user">${text}</div><div class="btime">${new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}</div>`;
    m.appendChild(w); m.scrollTop = m.scrollHeight;
}

// הודעת פתיחה
function welcome() {
    const b = getBalances();
    addBotMsg(`צהוב עולה! ⚽\nיתרה בבנק: ${b.bank}₪ | מזומן: ${b.cash}₪ | ביט: ${b.bit}₪.\nמה נרשום היום?`);
}

async function send() {
    const inp = document.getElementById("msginput");
    const val = inp.value.trim();
    if(!val || !apiKey) return;
    addUserMsg(val);
    inp.value = "";
    // כאן אמור להיות הקריאה ל-API (שמרתי על המבנה שלך)
    addBotMsg("נרשם! המערכת מעבדת...");
}

function saveApiKey() {
    apiKey = document.getElementById("apikey-input").value.trim();
    lsSet(LS.apikey, apiKey);
    alert("נשמר!");
}

function setQuick(t) { document.getElementById("msginput").value = t; }

document.addEventListener("DOMContentLoaded", () => {
    welcome();
});
</script>
</body>
</html>
