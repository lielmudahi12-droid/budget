<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="בוט תקציב ⚽">
    <meta name="theme-color" content="#0A0A14">
    <title>בוט תקציב ⚽💛🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Heebo', sans-serif; direction: rtl; background: #0A0A14; color: #E8E8F0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; max-width: 430px; margin: 0 auto; }
        #topbar { background: linear-gradient(135deg, #0D1F0D, #0A1A0A); border-bottom: 1px solid #FFD70022; padding: 11px 14px 9px; flex-shrink: 0; }
        #topbar .inner { display: flex; align-items: center; gap: 10px; }
        #avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #FFD700, #FFA500); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
        #botname { font-size: 13px; font-weight: 800; color: #fff; }
        #syncstatus { font-size: 9px; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        #syncdot { width: 5px; height: 5px; border-radius: 50%; background: #55EFC4; flex-shrink: 0; }
        #synctext { color: #55EFC4; }
        #tabs { display: flex; gap: 5px; margin-right: auto; }
        .tab { padding: 5px 9px; border-radius: 11px; border: 1px solid #ffffff15; background: transparent; color: #555; cursor: pointer; font-size: 12px; font-family: 'Heebo', sans-serif; transition: .2s; }
        .tab.active { border-color: #FFD700; background: #FFD70018; color: #FFD700; }
        .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .view.active { display: flex; }
        #messages { flex: 1; overflow-y: auto; padding: 10px 11px 0; display: flex; flex-direction: column; gap: 7px; }
        .bubble-wrap { display: flex; flex-direction: column; position: relative; }
        .bubble-wrap.user { align-items: flex-start; }
        .bubble-wrap.bot { align-items: flex-end; }
        .bubble { max-width: 82%; padding: 9px 13px; font-size: 13px; line-height: 1.65; white-space: pre-wrap; color: #e0e0e0; }
        .bubble.user { background: linear-gradient(135deg, #1a2a3a, #162030); border-radius: 17px 17px 17px 3px; border: 1px solid #4ECDC420; }
        .bubble.bot { background: linear-gradient(135deg, #1a1a0a, #201800); border-radius: 17px 17px 3px 17px; border: 1px solid #FFD70020; }
        .txn-chip { margin-top: 5px; background: #00000050; border-radius: 7px; padding: 5px 9px; font-size: 11px; display: flex; gap: 6px; align-items: center; }
        .btime { font-size: 9px; color: #444; margin-top: 1px; padding: 0 3px; }
        .typing { display: flex; gap: 4px; align-items: center; padding: 9px 14px; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: #FFD700; animation: bounce 1s infinite; }
        .dot:nth-child(2) { animation-delay: .2s; } .dot:nth-child(3) { animation-delay: .4s; }
        #quickrow { padding: 7px 11px 3px; overflow-x: auto; display: flex; gap: 5px; flex-shrink: 0; scrollbar-width: none; }
        #quickrow::-webkit-scrollbar { display: none; }
        .quick { padding: 5px 10px; border-radius: 13px; border: 1px solid #ffffff10; background: #13131F; color: #777; cursor: pointer; font-size: 11px; font-family: 'Heebo', sans-serif; white-space: nowrap; flex-shrink: 0; }
        .del-msg { display: none; position: absolute; top: 2px; left: 2px; background: #FF6B6B; color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 9px; cursor: pointer; align-items: center; justify-content: center; z-index: 10; }
        .bubble-wrap:hover .del-msg { display: flex; }
        #inputrow { padding: 7px 11px 14px; display: flex; gap: 7px; flex-shrink: 0; }
        #msginput { flex: 1; padding: 11px 13px; border-radius: 21px; border: 1px solid #ffffff13; background: #13131F; color: #E8E8F0; font-size: 14px; font-family: 'Heebo', sans-serif; outline: none; }
        #sendbtn { width: 43px; height: 43px; border-radius: 50%; border: none; flex-shrink: 0; background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; }
        #sendbtn:disabled { background: #1a1a1a; color: #333; cursor: default; }
        .sum-inner { padding: 11px; overflow-y: auto; }
        .bal-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-bottom: 8px; }
        .bal-card { background: #13131F; border-radius: 11px; padding: 11px 9px; text-align: center; border: 1px solid #ffffff08; }
        .bal-label { font-size: 10px; color: #555; margin-bottom: 2px; }
        .bal-val { font-size: 16px; font-weight: 800; }
        .total-card { background: #13131F; border: 1px solid #FFD70025; border-radius: 13px; padding: 10px; margin-bottom: 10px; text-align: center; }
        .scard { background: #13131F; border-radius: 13px; padding: 13px; margin-bottom: 9px; }
        .scard-title { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 9px; }
        .cat-row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
        .cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .cat-name { flex: 1; font-size: 11px; color: #bbb; }
        .cat-val { font-size: 12px; font-weight: 700; }
        .cat-bar-bg { width: 50px; height: 4px; background: #0A0A14; border-radius: 3px; overflow: hidden; }
        .cat-bar { height: 100%; border-radius: 3px; }
        .txn-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #ffffff05; }
        .tr-card { background: #0E1F0E; border: 1px solid #55EFC425; border-radius: 13px; padding: 13px; margin-bottom: 9px; }
        .tr-title { font-size: 11px; font-weight: 700; color: #55EFC4; margin-bottom: 9px; }
        .tr-row { display: flex; gap: 7px; align-items: center; margin-bottom: 8px; }
        .tr-sel, .tr-inp { flex: 1; padding: 8px 10px; border-radius: 9px; border: 1px solid #ffffff15; background: #0A0A14; color: #E8E8F0; font-size: 12px; font-family: 'Heebo', sans-serif; outline: none; }
        .tr-btn { padding: 9px 16px; border-radius: 9px; border: none; background: linear-gradient(135deg, #55EFC4, #00B894); color: #000; font-weight: 800; font-size: 12px; cursor: pointer; font-family: 'Heebo', sans-serif; }
        .icard { background: #13131F; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #ffffff0a; }
        .icard-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
        .istep { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
        .istep-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
        .istep-text { font-size: 12px; color: #bbb; line-height: 1.6; }
        #apisetup { background: #13131F; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #ffffff0a; }
        #apikey-input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #ffffff15; background: #0A0A14; color: #E8E8F0; font-size: 13px; font-family: 'Heebo', sans-serif; outline: none; margin-bottom: 8px; }
        #apikey-save { width: 100%; padding: 11px; border-radius: 10px; border: none; background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; font-weight: 800; font-size: 14px; cursor: pointer; font-family: 'Heebo', sans-serif; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0) } 40% { transform: translateY(-5px) } }
    </style>
</head>
<body>

<div id="topbar">
  <div class="inner">
    <div id="avatar">⚽</div>
    <div>
      <div id="botname">בוט התקציב 💛🖤</div>
      <div id="syncstatus"><div id="syncdot"></div><span id="synctext">מוכן</span></div>
    </div>
    <div id="tabs">
      <button class="tab active" data-view="chat" onclick="switchView('chat')">💬</button>
      <button class="tab" data-view="summary" onclick="switchView('summary')">📊</button>
      <button class="tab" data-view="install" onclick="switchView('install')">📲</button>
      <button class="tab" onclick="clearHistory()">🗑️</button>
      <button class="tab" onclick="syncAll()">🔄</button>
    </div>
  </div>
</div>

<div id="chat-view" class="view active">
  <div id="messages"></div>
  <div id="quickrow">
    <button class="quick" onclick="setQuick('אכלתי שוורמה ב-38')">🌯 שוורמה</button>
    <button class="quick" onclick="setQuick('נסעתי ברכבת ב-22')">🚂 רכבת</button>
    <button class="quick" onclick="setQuick('קיבלתי 400 שקל מזומן')">💵 מזומן</button>
    <button class="quick" onclick="setQuick('כמה הוצאתי החודש?')">📊 סיכום</button>
  </div>
  <div id="inputrow">
    <input id="msginput" type="text" placeholder="כתוב כאן..." onkeydown="if(event.key==='Enter')send()">
    <button id="sendbtn" onclick="send()" disabled>➤</button>
  </div>
</div>

<div id="summary-view" class="view">
  <div class="sum-inner" id="summary-content"></div>
</div>

<div id="install-view" class="view">
  <div style="padding:16px;">
    <div class="icard">
      <div class="icard-title" style="color:#FFD700">🔑 הגדרת API</div>
      <p style="font-size:11px; color:#888; margin-bottom:10px;">תומך ב-Gemini או ב-Groq (מומלץ!)</p>
      <input id="apikey-input" type="password" placeholder="הדבק מפתח כאן...">
      <button id="apikey-save" onclick="saveApiKey()">שמור מפתח ✓</button>
      <div id="apikey-status" style="font-size:11px; margin-top:5px; text-align:center;"></div>
    </div>
  </div>
</div>

<script>
// --- הגדרות ומשתנים ---
const LS = { wallet: "bgt_wallet", txns: "bgt_txns", income: "bgt_income", apikey: "bgt_apikey", transfers: "bgt_transfers", chatHistory: "bgt_chat_history", debts: "bgt_debts" };
const lsGet = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const lsSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); if(k !== LS.chatHistory) syncPush(k,v); } catch {} };

const SYNC_URL = "https://script.google.com/macros/s/AKfycbxsVKlcH7iGj4gXmpc6o-bAt_zLZ-WOO_AGx-im0CBCcU_nkZ-HEAcMyvzt8YC793ck/exec";
const COLORS = { food: "#FF6B6B", transport: "#4ECDC4", hobbies: "#A29BFE", social: "#FD79A8", beitar: "#FFD700", savings: "#55EFC4", other: "#636e72" };
const CAT_LABELS = { food: "🍔 אוכל", transport: "🚂 תחבורה", hobbies: "🎮 תחביבים", social: "👥 חברה", beitar: "⚽ ביתר", savings: "💰 חיסכון", other: "📦 אחר" };
const TYPE_ICON = { cash: "💵", credit: "💳", bit: "🔵" };
const W_NAMES = { cash: "מזומן", bank: "בנק", bit: "ביט" };

let wallet = lsGet(LS.wallet, { cash: 1300, bank: 1620, bit: 0 });
let txns = lsGet(LS.txns, {});
let income = lsGet(LS.income, []);
let transfers = lsGet(LS.transfers, []);
let debts = lsGet(LS.debts, []);
let apiKey = lsGet(LS.apikey, null);
let loading = false;
window._pendingTxn = null;

// --- פונקציות עזר ---
function nowMonth() { const d = new Date(); return `${["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"][d.getMonth()]} ${d.getFullYear()}`; }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function nowTime() { return new Date().toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" }); }
function scrollBottom() { const m = document.getElementById("messages"); m.scrollTop = m.scrollHeight; }
function categorize(d) {
    d = d.toLowerCase();
    if (/שוורמה|פלאפל|אוכל|פיצה/.test(d)) return "food";
    if (/רכבת|אוטובוס|מונית/.test(d)) return "transport";
    if (/ביתר|משחק/.test(d)) return "beitar";
    return "other";
}

function getBalances() {
    const cur = txns[nowMonth()] || [];
    const sum = (arr, filter) => arr.filter(filter).reduce((s, x) => s + x.amount, 0);
    
    let ca = 0, ba = 0, bta = 0;
    transfers.forEach(tr => {
        if(tr.from === "cash") ca -= tr.amount; if(tr.to === "cash") ca += tr.amount;
        if(tr.from === "bank") ba -= tr.amount; if(tr.to === "bank") ba += tr.amount;
        if(tr.from === "bit") bta -= tr.amount; if(tr.to === "bit") bta += tr.amount;
    });

    return {
        cash: wallet.cash + sum(income, i => i.type === "cash") - sum(cur, t => t.type === "cash") + ca,
        bank: wallet.bank + sum(income, i => i.type === "bank") - sum(cur, t => t.type === "credit") + ba,
        bit: wallet.bit + sum(income, i => i.type === "bit") - sum(cur, t => t.type === "bit") + bta,
        totalSpent: sum(cur, t => t.category !== "savings"),
        currentTxns: cur
    };
}

// --- ממשק משתמש ---
function addUserMsg(text) {
    const m = document.getElementById("messages");
    const w = document.createElement("div"); w.className = "bubble-wrap user";
    w.innerHTML = `<button class="del-msg" onclick="this.parentElement.remove();saveChatHistory()">✕</button><div class="bubble user">${text}</div><div class="btime">${nowTime()}</div>`;
    m.appendChild(w); scrollBottom();
}

function addBotMsg(text, chip = null) {
    const m = document.getElementById("messages");
    const w = document.createElement("div"); w.className = "bubble-wrap bot";
    let chipHtml = "";
    if (chip) {
        const icon = chip.isTransfer ? "🔄" : (chip.income ? "📥 +" : "📤 −");
        const col = chip.income || chip.isTransfer ? "#55EFC4" : "#FF6B6B";
        chipHtml = `<div class="txn-chip"><span style="color:${col}">${icon}${chip.amount}₪</span><span style="color:#888">${chip.desc}</span></div>`;
    }
    w.innerHTML = `<button class="del-msg" onclick="this.parentElement.remove();saveChatHistory()">✕</button><div class="bubble bot">${text}${chipHtml}</div><div class="btime">${nowTime()}</div>`;
    m.appendChild(w); scrollBottom();
}

function showTyping() {
    const m = document.getElementById("messages");
    const w = document.createElement("div"); w.id = "typing-msg"; w.className = "bubble-wrap bot";
    w.innerHTML = `<div class="bubble bot typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    m.appendChild(w); scrollBottom(); return w;
}

// --- לוגיקה מרכזית (API & Actions) ---
async function send() {
    const inp = document.getElementById("msginput");
    const text = inp.value.trim();
    if (!text || loading) return;

    inp.value = ""; document.getElementById("sendbtn").disabled = true;
    addUserMsg(text);

    if (!apiKey) { addBotMsg("⚠️ חסר מפתח API. הגדר בלשונית 📲"); return; }

    loading = true;
    const te = showTyping();
    const bal = getBalances();
    const pending = window._pendingTxn ? JSON.stringify(window._pendingTxn) : "none";

    const sys = `Budget bot. Hebrew ONLY. JSON output. 
    Status: cash=${bal.cash} bank=${bal.bank} bit=${bal.bit} spent=${bal.totalSpent} | Pending: ${pending}
    Actions: add_expense, add_income, transfer, add_debt, pay_debt, ask_type, none
    JSON: {"reply":"", "action":"", "transaction":{"desc":"", "amount":0, "category":"", "type":"cash|credit|bit", "is_income":false}, "transfer":{"from":"","to":"","amount":0}, "debt":{"person":"", "amount":0}}`;

    try {
        const data = await callAPI(sys + "\nUser: " + text);
        te.remove();
        
        let raw = data.choices ? data.choices[0].message.content : data.candidates[0].content.parts[0].text;
        let p = JSON.parse(raw.replace(/```json|```/g, "").trim());

        let chip = null;

        // טיפול בטרנזקציה ממתינה (סוג תשלום)
        if (p.action === "ask_type" && p.transaction) {
            window._pendingTxn = p.transaction;
        } else if (window._pendingTxn && !p.transaction?.type) {
            const l = text.toLowerCase();
            let type = /מזומן/.test(l) ? "cash" : /אשראי|כרטיס/.test(l) ? "credit" : /ביט/.test(l) ? "bit" : null;
            if (type) {
                p.transaction = { ...window._pendingTxn, type };
                p.action = window._pendingTxn.is_income ? "add_income" : "add_expense";
                window._pendingTxn = null;
            }
        }

        // ביצוע פעולות
        if (p.action === "add_expense" && p.transaction?.amount) {
            const t = p.transaction; const m = nowMonth();
            if(!txns[m]) txns[m] = [];
            const newT = { id: Date.now(), date: todayStr(), desc: t.desc || text, amount: t.amount, category: t.category || categorize(t.desc || text), type: t.type || "cash" };
            txns[m].push(newT); lsSet(LS.txns, txns);
            chip = { ...newT, income: false };
        } else if (p.action === "transfer" && p.transfer?.amount) {
            const tr = p.transfer; transfers.push({ id: Date.now(), date: todayStr(), ...tr });
            lsSet(LS.transfers, transfers);
            chip = { amount: tr.amount, desc: `העברה`, isTransfer: true };
        }

        addBotMsg(p.reply || "בוצע ✓", chip);
        saveChatHistory();
    } catch (e) {
        if(te) te.remove();
        addBotMsg("⚠️ שגיאה בתקשורת. נסה שוב.");
    } finally {
        loading = false; document.getElementById("sendbtn").disabled = false;
    }
}

async function callAPI(prompt) {
    const isGroq = apiKey.startsWith("gsk_");
    const url = isGroq ? "https://api.groq.com/openai/v1/chat/completions" : "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey;
    
    const body = isGroq ? {
        model: "llama-3.3-70b-versatile",
        messages: [{ role: "user", content: prompt }],
        response_format: { type: "json_object" }
    } : {
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json" }
    };

    const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...(isGroq ? { "Authorization": `Bearer ${apiKey}` } : {}) },
        body: JSON.stringify(body)
    });
    return r.json();
}

// --- ניהול נתונים ---
function saveApiKey() {
    const val = document.getElementById("apikey-input").value.trim();
    if (val.length < 10) return;
    apiKey = val; localStorage.setItem(LS.apikey, JSON.stringify(val));
    document.getElementById("apikey-status").textContent = "המפתח נשמר ✓";
    setTimeout(() => switchView("chat"), 1000);
}

function clearHistory() { if(confirm("למחוק הכל?")) { localStorage.removeItem(LS.chatHistory); document.getElementById("messages").innerHTML = ""; } }

function saveChatHistory() {
    const msgs = Array.from(document.querySelectorAll(".bubble-wrap")).map(w => ({
        user: w.classList.contains("user"),
        text: w.querySelector(".bubble").childNodes[0].textContent,
        chip: w.querySelector(".txn-chip")?.innerHTML || null
    })).slice(-30);
    localStorage.setItem(LS.chatHistory, JSON.stringify(msgs));
}

function restoreChatHistory() {
    const saved = lsGet(LS.chatHistory, []);
    saved.forEach(m => m.user ? addUserMsg(m.text) : addBotMsg(m.text, m.chip ? { amount: "", desc: "", html: m.chip } : null));
}

function switchView(v) {
    document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
    document.getElementById(v + "-view").classList.add("active");
    document.querySelector(`[data-view="${v}"]`).classList.add("active");
    if(v === "summary") renderSummary();
}

function renderSummary() {
    const bal = getBalances();
    const cats = bal.currentTxns.reduce((r, t) => { r[t.category] = (r[t.category] || 0) + t.amount; return r; }, {});
    
    document.getElementById("summary-content").innerHTML = `
        <div class="bal-grid">
            <div class="bal-card"><div class="bal-label">מזומן</div><div class="bal-val">${bal.cash}₪</div></div>
            <div class="bal-card"><div class="bal-label">בנק</div><div class="bal-val">${bal.bank}₪</div></div>
            <div class="bal-card"><div class="bal-label">ביט</div><div class="bal-val">${bal.bit}₪</div></div>
        </div>
        <div class="scard">
            <div class="scard-title">הוצאות לפי קטגוריה</div>
            ${Object.entries(cats).map(([c, v]) => `
                <div class="cat-row">
                    <div class="cat-dot" style="background:${COLORS[c]}"></div>
                    <div class="cat-name">${CAT_LABELS[c] || c}</div>
                    <div class="cat-val">${v}₪</div>
                </div>
            `).join("")}
        </div>
    `;
}

// --- סנכרון (Placeholder) ---
function syncPush(k, v) { 
    fetch(SYNC_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ key: k, value: JSON.stringify(v) }) }).catch(() => {});
}
async function syncAll() {
    document.getElementById("synctext").textContent = "מסנכרן...";
    try {
        const r = await fetch(SYNC_URL);
        const d = await r.json();
        if(d.data) {
            Object.keys(d.data).forEach(k => localStorage.setItem(k, d.data[k]));
            location.reload();
        }
    } catch(e) { document.getElementById("synctext").textContent = "מוכן"; }
}

function setQuick(t) { document.getElementById("msginput").value = t; document.getElementById("sendbtn").disabled = false; }

document.addEventListener("DOMContentLoaded", () => {
    restoreChatHistory();
    document.getElementById("msginput").addEventListener("input", (e) => document.getElementById("sendbtn").disabled = !e.target.value.trim());
});
</script>
